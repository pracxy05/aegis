# ═══════════════════════════════════════════
# SERVER
# ═══════════════════════════════════════════
server.port=${PORT:8080}
spring.devtools.restart.enabled=true

# ═══════════════════════════════════════════
# LOCAL MySQL fallback (Render uses DB_HOST etc. via DataSourceConfig)
# ═══════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/aegis_db
spring.datasource.username=aegis_user
spring.datasource.password=aegis123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ═══════════════════════════════════════════
# ✅ JACKSON FIX — THIS IS WHY EVENTS SHOW 0
# ═══════════════════════════════════════════
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=UTC

# ═══════════════════════════════════════════
# JWT
# ═══════════════════════════════════════════
aegis.jwt.secret=${AEGIS_JWT_SECRET:AEGIS_LOCAL_DEV_SECRET_2026_NOT_FOR_PROD}
aegis.jwt.expiration=${AEGIS_JWT_EXPIRATION:86400000}

# ═══════════════════════════════════════════
# API Keys
# ═══════════════════════════════════════════
api.nasa.key=${API_NASA_KEY:}
api.nasa.firms.key=${API_NASA_FIRMS_KEY:}
api.openweather.key=${API_OPENWEATHER_KEY:}
api.n2yo.key=${API_N2YO_KEY:}
api.openaq.key=${API_OPENAQ_KEY:}
api.astronomy.id=${API_ASTRONOMY_ID:}
api.astronomy.secret=${API_ASTRONOMY_SECRET:}
api.acled.email=${API_ACLED_EMAIL:}
api.acled.password=${API_ACLED_PASSWORD:}

# ═══════════════════════════════════════════
# Swagger
# ═══════════════════════════════════════════
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ═══════════════════════════════════════════
# CORS
# ═══════════════════════════════════════════
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ═══════════════════════════════════════════
# Scheduling
# ═══════════════════════════════════════════
spring.task.scheduling.pool.size=12