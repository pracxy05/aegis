# ═══════════════════════════════════════════
# SERVER
# ═══════════════════════════════════════════
server.port=${PORT:8080}
spring.devtools.restart.enabled=false

# ═══════════════════════════════════════════
# DATABASE — PostgreSQL (Render injects DATABASE_URL)
# ═══════════════════════════════════════════
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ═══════════════════════════════════════════
# JWT
# ═══════════════════════════════════════════
aegis.jwt.secret=${JWT_SECRET:AEGIS_DEV_SECRET_CHANGE_IN_PROD}
aegis.jwt.expiration=${JWT_EXPIRATION:86400000}

# ═══════════════════════════════════════════
# NASA APIs
# ═══════════════════════════════════════════
api.nasa.key=${NASA_API_KEY:}
api.nasa.firms.key=${FIRMS_API_KEY:}

# ═══════════════════════════════════════════
# Weather
# ═══════════════════════════════════════════
api.openweather.key=${OPENWEATHER_API_KEY:}

# ═══════════════════════════════════════════
# Satellite Tracking — N2YO
# ═══════════════════════════════════════════
api.n2yo.key=${N2YO_API_KEY:}

# ═══════════════════════════════════════════
# Air Quality — OpenAQ
# ═══════════════════════════════════════════
api.openaq.key=${OPENAQ_API_KEY:}

# ═══════════════════════════════════════════
# Astronomy API
# ═══════════════════════════════════════════
api.astronomy.id=${ASTRONOMY_ID:}
api.astronomy.secret=${ASTRONOMY_SECRET:}

# ═══════════════════════════════════════════
# ACLED — Conflict Data
# ═══════════════════════════════════════════
api.acled.email=${ACLED_EMAIL:}
api.acled.password=${ACLED_PASSWORD:}

# ═══════════════════════════════════════════
# Swagger
# ═══════════════════════════════════════════
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ═══════════════════════════════════════════
# CORS
# ═══════════════════════════════════════════
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ═══════════════════════════════════════════
# Scheduling
# ═══════════════════════════════════════════
spring.task.scheduling.pool.size=12
